name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# `actions-rust-lang/setup-rust-toolchain@v1` reads the channel from
# `rust-toolchain.toml` automatically and bundles `Swatinem/rust-cache`
# (cache key derives from `Cargo.lock` + toolchain), so jobs do not
# specify a toolchain version inline. Bump the pin file to bump CI.

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup show active-toolchain
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup show active-toolchain
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup show active-toolchain
      - run: cargo test --workspace

  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: rustup show active-toolchain
      - run: cargo build --release --workspace

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    # `rustsec/audit-check@v2` requires `token:` (input is mandatory in v2)
    # and uses it to create a check run + annotations, which needs
    # `checks: write`. The workflow-level grant is `contents: read`; this
    # job widens to add `checks: write` while keeping `contents: read`.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
